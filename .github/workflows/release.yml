name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FRP_VERSION: "0.69.1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download frpc binaries
        run: |
          set -e
          mkdir -p src/main/resources/assets/mcfrp/native
          VERSION="${{ env.FRP_VERSION }}"

          echo "--- Downloading frpc binaries (v$VERSION) ---"

          # Linux amd64
          echo "[1/3] Linux amd64"
          curl -fsSL -o frpc-linux.tar.gz \
            "https://github.com/fatedier/frp/releases/download/v${VERSION}/frp_${VERSION}_linux_amd64.tar.gz"
          tar -xzf frpc-linux.tar.gz
          cp "frp_${VERSION}_linux_amd64/frpc" src/main/resources/assets/mcfrp/native/frpc-linux
          chmod +x src/main/resources/assets/mcfrp/native/frpc-linux
          echo "  frpc-linux: $(ls -lh src/main/resources/assets/mcfrp/native/frpc-linux | awk '{print $5}')"

          # Windows amd64
          echo "[2/3] Windows amd64"
          curl -fsSL -o frpc-windows.zip \
            "https://github.com/fatedier/frp/releases/download/v${VERSION}/frp_${VERSION}_windows_amd64.zip"
          unzip -q frpc-windows.zip
          cp "frp_${VERSION}_windows_amd64/frpc.exe" src/main/resources/assets/mcfrp/native/frpc-windows.exe
          echo "  frpc-windows.exe: $(ls -lh src/main/resources/assets/mcfrp/native/frpc-windows.exe | awk '{print $5}')"

          # macOS amd64 (works on Apple Silicon via Rosetta 2)
          echo "[3/3] macOS amd64"
          curl -fsSL -o frpc-macos.tar.gz \
            "https://github.com/fatedier/frp/releases/download/v${VERSION}/frp_${VERSION}_darwin_amd64.tar.gz"
          tar -xzf frpc-macos.tar.gz
          cp "frp_${VERSION}_darwin_amd64/frpc" src/main/resources/assets/mcfrp/native/frpc-macos
          chmod +x src/main/resources/assets/mcfrp/native/frpc-macos
          echo "  frpc-macos: $(ls -lh src/main/resources/assets/mcfrp/native/frpc-macos | awk '{print $5}')"

          # Clean up download artifacts
          rm -f frpc-linux.tar.gz frpc-windows.zip frpc-macos.tar.gz
          rm -rf "frp_${VERSION}_linux_amd64" "frp_${VERSION}_windows_amd64" "frp_${VERSION}_darwin_amd64"

          echo "--- frpc binaries downloaded successfully ---"
          ls -lh src/main/resources/assets/mcfrp/native/

      - name: Build with Gradle
        run: ./gradlew build

      - name: Find built JAR
        id: find-jar
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: No JAR file found in build/libs"
            exit 1
          fi
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename "$JAR_FILE")" >> $GITHUB_OUTPUT
          echo "Found: $JAR_FILE ($(ls -lh "$JAR_FILE" | awk '{print $5}'))"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-jar.outputs.jar_file }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
